services:
  redis:
    image: redis:7-alpine
    env_file: .env
    environment:
      TZ: Asia/Seoul
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-orchestrator:
    build:
      context: ./api-orchestrator
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: Asia/Seoul
    ports:
      - "8080:8080"
    volumes:
      - ./api-orchestrator/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  websocket-listener:
      build:
        context: ./websocket-listener
      env_file: .env
      environment:
        POSTGRES_HOST: postgres
        POSTGRES_PORT: 5432
        REDIS_HOST: redis
        REDIS_PORT: 6379
        HEALTH_PORT: 8081
        TZ: Asia/Seoul
      ports:
        - "8081:8081"
      volumes:
        - ./websocket-listener/logs:/app/logs
      healthcheck:
        test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=3).read()"]
        interval: 15s
        timeout: 5s
        retries: 10
        start_period: 20s
      depends_on:
        api-orchestrator:
          condition: service_healthy
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
      restart: unless-stopped

  ai-engine:
    build:
      context: ./ai-engine
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_HEALTH_PORT: 8082
      API_ORCHESTRATOR_BASE_URL: http://api-orchestrator:8080
      TZ: Asia/Seoul
    ports:
      - "8082:8082"
    volumes:
      - ./ai-engine/logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    depends_on:
      api-orchestrator:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./telegram-bot
    env_file: .env
    environment:
      NODE_OPTIONS: --dns-result-order=ipv4first
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_ORCHESTRATOR_BASE_URL: http://api-orchestrator:8080
      AI_ENGINE_URL: http://ai-engine:8082
      TZ: Asia/Seoul
    expose:
      - "3001"
    extra_hosts:
      - "api.telegram.org:149.154.166.110"
    volumes:
      - ./telegram-bot/logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "src/healthcheck.js"]
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 25s
    depends_on:
      api-orchestrator:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  pg-data:
