spring:
  jackson:
    time-zone: Asia/Seoul

  task:
    scheduling:
      time-zone: Asia/Seoul

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:SMA}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      connection-init-sql: SET TIME ZONE 'Asia/Seoul'

  jpa:
    hibernate.ddl-auto: validate
    show-sql: false
    properties:
      hibernate.jdbc.time_zone: Asia/Seoul

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # 기존 DB에 Flyway 처음 도입 시 V1을 baseline으로 처리
    baseline-version: 1
    validate-on-migrate: false  # update 모드와 병행 시 Flyway 검증 비활성화

  batch:
    jdbc:
      initialize-schema: never  # Spring Batch 자체 스키마 자동 생성 비활성화

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

kiwoom:
  mode: ${KIWOOM_MODE:real}   # real or mock
  api:
    app-key: ${KIWOOM_APP_KEY}
    app-secret: ${KIWOOM_APP_SECRET}
    base-url: ${KIWOOM_BASE_URL}
  trading:
    max-daily-signals: ${MAX_DAILY_SIGNALS:30}
    sector-overheat-threshold: ${SECTOR_OVERHEAT_THRESHOLD:3}
    stock-cooldown-minutes: ${STOCK_COOLDOWN_MINUTES:30}

swing:
  # 스윙 전략 목록 단일 소스 — 루트 .env SWING_STRATEGIES 환경변수로 오버라이드.
  # ForceCloseScheduler 가 이 값을 읽어 강제청산 제외 대상을 결정한다.
  strategies: ${SWING_STRATEGIES:S3_INST_FRGN,S5_PROG_FRGN,S7_ICHIMOKU_BREAKOUT,S8_GOLDEN_CROSS,S9_PULLBACK_SWING,S10_NEW_HIGH,S11_FRGN_CONT,S12_CLOSING,S13_BOX_BREAKOUT,S14_OVERSOLD_BOUNCE,S15_MOMENTUM_ALIGN}

claude:
  api-key: ${CLAUDE_API_KEY}
  model: ${CLAUDE_MODEL}

news:
  enabled: ${NEWS_ENABLED:true}
  trading-control-enabled: ${NEWS_TRADING_CONTROL:true}
  sector-filter-enabled: ${NEWS_SECTOR_FILTER:true}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN}
  allowed-chat-ids: ${TELEGRAM_ALLOWED_CHAT_IDS}

org:
  gradle:
    jvmargs: -enable-native-access=ALL-UNNAMED
