spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:SMA}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
#    hibernate.ddl-auto: ${DDL_AUTO:update}
    hibernate.ddl-auto: update
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

kiwoom:
  mode: ${KIWOOM_MODE:mock}   # real or mock
  api:
    app-key: ${KIWOOM_APP_KEY}
    app-secret: ${KIWOOM_APP_SECRET}
    base-url: ${KIWOOM_BASE_URL}
    ws-url: ${KIWOOM_WS_URL}
  websocket:
    # Python websocket-listener 와 동일 토큰을 사용하므로 기본 비활성화.
    # Kiwoom 은 토큰당 1개 연결만 허용 → 두 서비스 동시 연결 시 서로 킥킹 발생.
    # Python websocket-listener 를 사용하지 않을 경우에만 true 로 변경.
    enabled: ${JAVA_WS_ENABLED:false}
  trading:
    max-daily-signals: ${MAX_DAILY_SIGNALS:30}
    sector-overheat-threshold: ${SECTOR_OVERHEAT_THRESHOLD:3}
    stock-cooldown-minutes: ${STOCK_COOLDOWN_MINUTES:30}

claude:
  api-key: ${CLAUDE_API_KEY}
  model: ${CLAUDE_MODEL}

news:
  enabled: ${NEWS_ENABLED:true}
  trading-control-enabled: ${NEWS_TRADING_CONTROL:true}
  sector-filter-enabled: ${NEWS_SECTOR_FILTER:true}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN}
  allowed-chat-ids: ${TELEGRAM_ALLOWED_CHAT_IDS}

org:
  gradle:
    jvmargs: -enable-native-access=ALL-UNNAMED
